workflows:
  agripulse-ios:
    name: AgriPulse iOS
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: pradeepdevkey
    environment:
      groups:
        - signing
      vars:
        XCODE_PROJECT: "AgriPulse.xcodeproj"
        XCODE_SCHEME: "AgriPulse"
        APP_STORE_CONNECT_APP_APPLE_ID: "6760972266"
      xcode: latest
    scripts:
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
      - name: Fetch signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.agripulse.app" \
            --type IOS_APP_STORE \
            --create
      - name: Set up code signing
        script: |
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "6760972266" 2>/dev/null || echo "3")
          NEXT=$((LATEST + 1))
          echo "Latest TestFlight build: $LATEST → next: $NEXT"
          agvtool new-version -all "$NEXT"
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
